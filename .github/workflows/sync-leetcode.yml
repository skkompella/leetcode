name: Sync LeetCode

on:
  workflow_dispatch:            # lets you trigger a run manually from the Actions tab
  schedule:
    - cron: "0 8 * * *"         # daily, 08:00 UTC — commits only when there are new submissions

permissions:
  contents: write               # allow the job to push new solutions + README

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch new accepted submissions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: python scripts/sync_submissions.py

      - name: Regenerate stats README
        run: python scripts/generate_stats.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add solutions README.md .stats-cache.json .sync-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync LeetCode submissions"
            git push
          fi
